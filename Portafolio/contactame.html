<main>


<section id="contacto" class="contact-modern">
   <div style="text-align: center; margin-bottom: 50px;">
            <h2 style="color: var(--primary); letter-spacing: 2px; margin-right: 80px;">CONTACTAME</h2>
            <h1 class="section-title"></h1>
        </div>
  <div class="contact-container">

    <form class="contact-card" id="contactForm">
      <div class="input-group">
        <input type="text" id="nombre" required />
        <label>Nombre</label>
      </div>

      <div class="input-group">
        <input type="email" id="email" required />
        <label>Email</label>
      </div>

      <div class="input-group">
        <textarea id="mensaje" rows="4" required></textarea>
        <label>Mensaje</label>
      </div>

      <button type="submit" class="btn-glow">
        Enviar mensaje
      </button>

      <span class="form-msg" id="formMsg"></span>
    </form>

  </div>
</section>






</main>


<script src="https://cdn.jsdelivr.net/npm/emailjs@3/dist/email.min.js"></script>
<script src="script.js"></script>
